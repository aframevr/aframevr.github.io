name: Deploy to GitHub Pages

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: aframevr/aframe-site
          path: aframe-site

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'aframe-site/package-lock.json'

      - name: Install dependencies
        run: npm ci --ignore-scripts --include=dev
        working-directory: aframe-site

      - name: Build docs
        run: npm run bumpdocs
        working-directory: aframe-site

      - name: Generate site
        run: npm run generate
        working-directory: aframe-site

      - name: Generate Pagefind index
        run: npx pagefind@1.5.0 --site aframe-site/public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: aframe-site/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
